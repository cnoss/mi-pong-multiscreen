<!DOCTYPE html>
<html>
	<head>
		<title>Pong | Player</title>
		
		<meta charset="utf-8">
		<meta name="viewport" content="initial-scale=1.0, user-scalable=no">
		<link rel="stylesheet" href="./assets/css/main.css"></link>
	</head>
	<body class="client" id="client">
		<h1 id="title">PONG</h1>
		
		<div id="area"><div id="info"></div><div id="buttons"><button id="startBtn">Spiel starten</button><button id="newGameBtn">Neues Spiel starten</button></div></div>
		<div id="controls">
			<label for="sensitivity">Sensibilität</label>
			<input type="number" id="sensitivity" min="1" max="10" step="1" value="5">
			<label for="shakeSensitivity">Shake</label>
			<input type="number" id="shakeSensitivity" min="1" max="10" step="1" value="5">
		</div>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/0.12.10/Tone.min.js"></script>
		<script src="./assets/js/StartAudioContext.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.js"></script>
		<!--script src="./assets/lib/hammer.min.js"--><!--/script-->
		<script src="./assets/js/main.js"></script>
	</body>
</html>
