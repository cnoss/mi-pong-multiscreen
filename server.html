<!DOCTYPE html>
<html>
	<head>
		<title>Pong | Server</title>

		<meta charset="utf-8">
		<meta name="viewport" content="initial-scale=1.0, user-scalable=no">
		<link rel="stylesheet" href="./assets/css/main.css">
    <link rel="shortcut icon" type="image/x-icon" href="https://www.medieninformatik.th-koeln.de/favicons/favicon.ico">

	</head>
	<body class="server">
		<canvas id="canvas"></canvas>

		<div id="qrcode_container">
			<div id="qrcode_left"></div><!--
			--><div id="qrcode_right"></div>
		</div>

		<div id="footer">
				<button id="newSessionBtn" title="Neue Session (Taste N)">Neue Session</button>
				<span id="speedControl">
					<label for="gameSpeed">Geschwindigkeit</label>
					<input type="number" id="gameSpeed" min="1" max="10" step="1" value="5">
				</span>
				<img src="./assets/imgs/mi-box-ws.png" id="viel_drin" alt="Viel Drin" />
		    <img src="./assets/imgs/th_logo.png" id="th_logo" alt="Logo TH Köln" />
		<div>
		<script src="https://apis.google.com/js/client.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/0.12.10/Tone.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.js"></script>
		<script src="./assets/lib/qr.js"></script>
		<script src="./assets/js/server.js"></script>

	</body>
</html>
